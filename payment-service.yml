server:
  port: 8088

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://payment-db:3306/payment_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
        concurrency: 1
        max-concurrency: 5
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          max-interval: 8000
          multiplier: 2.0
          stateless: false

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}

# RabbitMQ queues and routing keys
rabbitmq:
  exchange: founderlink.exchange
  dlx: founderlink.dlx
  dlq: founderlink.dlq
  investment:
    created:
      routing-key: investment.created
    approved:
      routing-key: investment.approved
    rejected:
      routing-key: investment.rejected
  payment:
    completed:
      routing-key: payment.completed
    failed:
      routing-key: payment.failed

resilience4j:
  circuitbreaker:
    instances:
      wallet-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

logging:
  level:
    com.founderlink.payment: DEBUG
